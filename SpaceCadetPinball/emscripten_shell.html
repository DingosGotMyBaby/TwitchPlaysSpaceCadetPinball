<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <title>3D Pinball for Windows - Space Cadet</title>
    <script src="tmi.min.js"></script>
    <style>
        /* Based on https://tpenguinltg.github.io/winclassic/ */
        :root {
            --ActiveBorder: rgb(212, 208, 200);
            --ActiveTitle: rgb(10, 36, 106);
            --AppWorkspace: rgb(128, 128, 128);
            /*--Background: rgb(58, 110, 165);*/
            --ButtonAlternateFace: rgb(192, 192, 192);
            --ButtonDkShadow: rgb(64, 64, 64);
            --ButtonFace: rgb(212, 208, 200);
            --ButtonHilight: rgb(255, 255, 255);
            --ButtonLight: rgb(212, 208, 200);
            --ButtonShadow: rgb(128, 128, 128);
            --ButtonText: rgb(0, 0, 0);
            --GradientActiveTitle: rgb(166, 202, 240);
            --GradientInactiveTitle: rgb(192, 192, 192);
            --GrayText: rgb(128, 128, 128);
            --Hilight: rgb(10, 36, 106);
            --HilightText: rgb(255, 255, 255);
            --HotTrackingColor: rgb(0, 0, 128);
            --InactiveBorder: rgb(212, 208, 200);
            --InactiveTitle: rgb(128, 128, 128);
            --InactiveTitleText: rgb(212, 208, 200);
            --InfoText: rgb(0, 0, 0);
            --InfoWindow: rgb(255, 255, 225);
            --Menu: rgb(212, 208, 200);
            --MenuBar: rgb(192, 192, 192);
            --MenuHilight: rgb(0, 0, 128);
            --MenuText: rgb(0, 0, 0);
            --Scrollbar: rgb(212, 208, 200);
            --TitleText: rgb(255, 255, 255);
            --Transparent: rgba(0, 0, 0, 0);
            --Window: rgb(255, 255, 255);
            --WindowFrame: rgb(0, 0, 0);
            --WindowText: rgb(0, 0, 0);
        }

        body {
            font-family: Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--Transparent);
            text-align: center;
        }

        textarea.emscripten {
            font-family: monospace;
            width: 80%;
        }

        canvas.emscripten {
            border: 0px none;
            background-color: var(--Transparent);
        }

        .titlebar {
            text-align: start;
            margin: 0px;
            padding: 1px;
            position: relative;
            overflow: hidden;
            display: flex;
            user-select: none;
        }

        .titlebar .titlebar-icon {
            width: 16px;
            height: 16px;
            padding: 1px;
        }

        .titlebar .titlebar-title {
            display: flex;
            padding: 0px 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex-grow: 1;
            font-weight: bold;
            align-items: center;
        }

        .titlebar .titlebar-wincontrols {
            display: inline-block;
            margin: 0px;
            padding: 1px;
            min-width: fit-content;
        }

        .titlebar-wincontrols .buttons-wrapper {
            display: inline-block;
            width: auto;
            margin: 0px;
            padding: 1px;
        }

        .titlebar-wincontrols .spacer {
            display: inline-block;
            margin: 0px;
            padding: 0px;
            width: 2px;
        }

        .titlebar-wincontrols .button {
            display: inline-block;
            min-width: 12px;
            min-height: 10px;
            width: 12px;
            height: 10px;
            text-align: center;
            vertical-align: middle;
            line-height: 10px;
        }

        .window {
            font-size: 8pt;
            color: var(--WindowText);
            background-color: var(--ButtonFace);
            border: 1px solid var(--ActiveBorder);
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonHilight), 0px 0px 0px 1px var(--ButtonShadow), -0.5px -0.5px 0px 1.5px var(--ButtonLight), 0px 0px 0px 2px var(--ButtonDkShadow);
            padding-right: 0;
            margin-left: auto;
            margin-right: auto;
            display: inline-block;
        }

        .window.active {
            border: 1px solid var(--ActiveBorder);
        }

        .window.active .titlebar .titlebar-icon {
            background-color: var(--ActiveTitle);
            color: var(--TitleText);
        }

        .window.active .titlebar .titlebar-title {
            background-color: var(--ActiveTitle);
            background-image: linear-gradient(to right, var(--ActiveTitle), var(--GradientActiveTitle));
            color: var(--TitleText);
        }

        .window.active .titlebar .titlebar-wincontrols,
        .window.active .titlebar .titlebar-wincontrols .buttons-wrapper {
            background-color: var(--GradientActiveTitle);
            font-size: 8pt;
            font-weight: bold;
        }


        .button {
            margin: 2px;
        }

        .button span.button-content {
            display: inline-block;
        }

        .button:active .button-content {
            transform: translate(1px, 1px);
        }

        .button {
            background-color: var(--ButtonFace);
            color: var(--ButtonText);
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonLight), 0px 0px 0px 1px var(--ButtonShadow), -0.5px -0.5px 0px 1.5px var(--ButtonHilight), 0px 0px 0px 2px var(--ButtonDkShadow);
        }

        .button:active {
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonShadow), 0px 0px 0px 1px var(--ButtonShadow), -0.5px -0.5px 0px 1.5px var(--WindowFrame), 0px 0px 0px 2px var(--WindowFrame);
        }

        .button svg path {
            fill: var(--ButtonText);
        }

        .titlebar .button:active {
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonShadow), 0px 0px 0px 1px var(--ButtonLight), -0.5px -0.5px 0px 1.5px var(--ButtonDkShadow), 0px 0px 0px 2px var(--ButtonHilight);
        }

        #status {
            margin: 40px 32px;
        }
    </style>
</head>

<body>
<div class="window active">
    <div class="titlebar">
        <span class="titlebar-title">3D Pinball for Windows - Space Cadet</span>
        <div class="titlebar-wincontrols">

                        <g id="layer1" transform="translate(0,-1042.3622)">
                            <path
                                    d="m 2.0025485,1043.3853 2.0198115,0 0,1.0185 0.984011,0 0,0.984 1.985286,0 0,-0.984 1.001274,0 0,-1.0185 2.002548,0 0,1.0013 0,0 0,0 -1.001274,0 0,1.0012 -1.001274,0 0,0.9841 -1.001274,0 0,1.0012 1.001274,0 0,1.0013 1.001274,0 0,1.0013 1.001274,0 0,1.0013 -2.002548,0 0,-1.0013 -1.001274,0 0,-0.984 -1.985286,0 0,0.984 -1.001274,0 0,1.0013 -2.0025485,0 0,-1.0013 1.0012745,0 0,-1.0013 1.001274,0 0,-1.0013 1.001274,0 0,-1.0012 -1.001274,0 0,-0.9841 -1.001274,0 0,-1.0012 -1.0012745,0 0,-1.0186 z"
                                    fill="black" id="Close" stroke-width="0"></path>

        </div>
    </div>

    <div class="emscripten" id="status">Downloading...</div>
    <div class="emscripten">
        <progress hidden=1 id="progress" max="100" value="0"></progress>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" style="display:none;"
            tabindex="-1"></canvas>
</div>

<!--<textarea class="emscripten" id="output" rows="8"></textarea>-->

<script type='text/javascript'>
    const VolumeQueryParam = new URLSearchParams(window.location.search).get("vol") ?? 0.5;

    let arguv = ["-vol", (VolumeQueryParam).toString()]

    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');

    var Module = {
        preRun: [],
        postRun: [],
        print: (function () {
            var element = document.getElementById('output');
            if (element) element.value = ''; // clear browser cache
            return function (text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                // These replacements are necessary if you render to raw HTML
                //text = text.replace(/&/g, "&amp;");
                //text = text.replace(/</g, "&lt;");
                //text = text.replace(/>/g, "&gt;");
                //text = text.replace('\n', '<br>', 'g');
                console.log(text);
                /*if (element) {
                    element.value += text + "\n";
                    element.scrollTop = element.scrollHeight; // focus on bottom
                }*/
            };
        })(),
        printErr: function (text) {
            // alert("ERROR OCCURRED: Check console for details.")
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.error(text);
        },
        canvas: (function () {
            var canvas = document.getElementById('canvas');

            // As a default initial behavior, pop up an alert when webgl context is lost. To make your
            // application robust, you may want to override this behavior before shipping!
            // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
            canvas.addEventListener("webglcontextlost", function (e) {
                alert('WebGL context lost. You will need to reload the page.');
                e.preventDefault();
            }, false);

            return canvas;
        })(),
        setStatus: function (text) {
            if (!Module.setStatus.last) Module.setStatus.last = {time: Date.now(), text: ''};
            if (text === Module.setStatus.last.text) return;

            var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
            var now = Date.now();
            if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
            Module.setStatus.last.time = now;
            Module.setStatus.last.text = text;
            if (m) {
                text = m[1];
                progressElement.value = parseInt(m[2]) * 100;
                progressElement.max = parseInt(m[4]) * 100;
                progressElement.hidden = false;
            } else {
                progressElement.value = null;
                progressElement.max = null;
                progressElement.hidden = true;

                var canvas = document.getElementById('canvas');
                canvas.style.display = "";
            }
            statusElement.innerHTML = text;

            if (text === "") {
                statusElement.style.display = "none";
                progressElement.style.display = "none";
            } else {
                statusElement.style.display = "";
                progressElement.style.display = "";
            }
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        },
        arguments: arguv,
    };
    Module.setStatus('Downloading...');
    window.onerror = function () {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function (text) {
            if (text) Module.printErr('[post-exception status] ' + text);
        };
    };
</script>
<script>
    const debugMode = new URLSearchParams(window.location.search).get("debug");

    Module['onRuntimeInitialized'] = function () {
        // This is called when the Emscripten runtime is fully initialized.
        // You can put any code here that you want to run after the game is ready.
        console.log('Emscripten runtime initialized.');

        // Get all query params
        let urlParms = new URLSearchParams(window.location.search);
        // for (let [key, value] of urlParms.entries()) {
        //     console.log(`${key}: ${value}`);
        // }

        /**
         * Calls the C++ TriggerEvent function.
         * @param {string} eventType The type of event to trigger (e.g., "leftdown", "launch", "newgame").
         */
        function callTriggerEvent(eventType) {
            if (typeof Module !== 'undefined' && typeof Module.TriggerEvent === 'function') {
                Module.TriggerEvent(eventType);
                // console.log(`Triggered event: ${eventType}`);
            } else {
                console.error("Emscripten Module or TriggerEvent function not found.");
            }
        }

        // init tmi.js
        const client = new tmi.Client({
            connection: {
                reconnect: true,
                maxReconnectAttempts: Infinity,
                maxReconnectInterval: 30000, // 30 seconds
                reconnectDecay: 1.4,
                reconnectInterval: 5000, // 5 seconds
                timeout: 180000, // 3 minutes
            },
            channels: [urlParms.get('channel') || 'bobross'] // Pulls from URL parameter or defaults to 'bobross'
        });

        client.connect().catch(console.error);
        client.on('connected', (addr, port) => {
            console.log(`Connected to ${addr}:${port} and listening to ${client.channels}`);
        });

        commandLock = [];


        client.on('message', (channel, tags, message, self) => {
            // console.log("Message received:", {channel, tags, message, self});
            // Check if the message is from the bot itself
            if (self) return; // Ignore messages from the bot itself

            // Check if the message starts with a command prefix
            if (message.startsWith('!')) {
                const command = message.slice(1).toLowerCase().trim();

                // Handle specific commands
                switch (command) {
                    case 'left':
                        // Prevent spamming the left command
                        if (commandLock.includes('left')) {
                            return; // Ignore if already locked
                        }
                        callTriggerEvent('leftdown');
                        commandLock.push('left'); // Lock the command
                        setTimeout(() => {
                            callTriggerEvent('leftup');
                            commandLock = commandLock.filter(cmd => cmd !== 'left'); // Unlock after 200ms
                        }, 200); // Simulate a 200msec hold
                        break;
                    case 'right':
                        // Prevent spamming the right command
                        if (commandLock.includes('right')) {
                            return; // Ignore if already locked
                        }
                        callTriggerEvent('rightdown');
                        setTimeout(() => {
                            callTriggerEvent('rightup');
                            commandLock = commandLock.filter(cmd => cmd !== 'right'); // Unlock after 200ms
                        }, 200); // Simulate a 200msec hold
                        break;
                    case 'launch':
                        // Allow mods, broadcaster, and VIPs
                        isMod = tags.mod === true;
                        isBroadcaster = channel.replace('#', '') === tags.username;
                        isVip = tags.badges && tags.badges.vip === '1';

                        if (!isMod && !isBroadcaster && !isVip) {
                            return; // Ignore non-authorized users
                        }
                        callTriggerEvent("launch");
                        break;
                    case 'newgame':
                        // Allow mods, broadcaster, and VIPs
                        isMod = tags.mod === true;
                        isBroadcaster = channel.replace('#', '') === tags.username;
                        isVip = tags.badges && tags.badges.vip === '1';

                        if (!isMod && !isBroadcaster && !isVip) {
                            return; // Ignore non-authorized users
                        }
                        callTriggerEvent('newgame');
                        break;
                    case 'demo':
                        // Allow mods, broadcaster, and VIPs
                        isMod = tags.mod === true;
                        isBroadcaster = channel.replace('#', '') === tags.username;
                        isVip = tags.badges && tags.badges.vip === '1';

                        if (!isMod && !isBroadcaster && !isVip) {
                            return;
                        }
                        callTriggerEvent("demo");
                        break;
                    default:
                    // console.log(`Unknown command: ${command}`);
                }
            }
        });


    };
</script>
