<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <title>3D Pinball for Windows - Space Cadet</title>
    <script src="tmi.min.js"></script>
    <style>
        /* Based on https://tpenguinltg.github.io/winclassic/ */
        :root {
            --ActiveBorder: rgb(212, 208, 200);
            --ActiveTitle: rgb(10, 36, 106);
            --AppWorkspace: rgb(128, 128, 128);
            /*--Background: rgb(58, 110, 165);*/
            --ButtonAlternateFace: rgb(192, 192, 192);
            --ButtonDkShadow: rgb(64, 64, 64);
            --ButtonFace: rgb(212, 208, 200);
            --ButtonHilight: rgb(255, 255, 255);
            --ButtonLight: rgb(212, 208, 200);
            --ButtonShadow: rgb(128, 128, 128);
            --ButtonText: rgb(0, 0, 0);
            --GradientActiveTitle: rgb(166, 202, 240);
            --GradientInactiveTitle: rgb(192, 192, 192);
            --GrayText: rgb(128, 128, 128);
            --Hilight: rgb(10, 36, 106);
            --HilightText: rgb(255, 255, 255);
            --HotTrackingColor: rgb(0, 0, 128);
            --InactiveBorder: rgb(212, 208, 200);
            --InactiveTitle: rgb(128, 128, 128);
            --InactiveTitleText: rgb(212, 208, 200);
            --InfoText: rgb(0, 0, 0);
            --InfoWindow: rgb(255, 255, 225);
            --Menu: rgb(212, 208, 200);
            --MenuBar: rgb(192, 192, 192);
            --MenuHilight: rgb(0, 0, 128);
            --MenuText: rgb(0, 0, 0);
            --Scrollbar: rgb(212, 208, 200);
            --TitleText: rgb(255, 255, 255);
            --Transparent: rgba(0, 0, 0, 0);
            --Window: rgb(255, 255, 255);
            --WindowFrame: rgb(0, 0, 0);
            --WindowText: rgb(0, 0, 0);
        }

        body {
            font-family: Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--Transparent);
            text-align: center;
        }

        textarea.emscripten {
            font-family: monospace;
            width: 80%;
        }

        canvas.emscripten {
            border: 0px none;
            background-color: var(--Transparent);
        }

        canvas.emscripten.loading {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        .titlebar {
            text-align: start;
            margin: 0px;
            padding: 1px;
            position: relative;
            overflow: hidden;
            display: flex;
            user-select: none;
        }

        .titlebar .titlebar-icon {
            width: 16px;
            height: 16px;
            padding: 1px;
        }

        .titlebar .titlebar-title {
            display: flex;
            padding: 0px 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex-grow: 1;
            font-weight: bold;
            align-items: center;
        }

        .titlebar .titlebar-wincontrols {
            display: inline-block;
            margin: 0px;
            padding: 1px;
            min-width: fit-content;
        }

        .titlebar-wincontrols .buttons-wrapper {
            display: inline-block;
            width: auto;
            margin: 0px;
            padding: 1px;
        }

        .titlebar-wincontrols .spacer {
            display: inline-block;
            margin: 0px;
            padding: 0px;
            width: 2px;
        }

        .titlebar-wincontrols .button {
            display: inline-block;
            min-width: 12px;
            min-height: 10px;
            width: 12px;
            height: 10px;
            text-align: center;
            vertical-align: middle;
            line-height: 10px;
        }

        .window {
            font-size: 8pt;
            color: var(--WindowText);
            background-color: var(--ButtonFace);
            border: 1px solid var(--ActiveBorder);
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonHilight), 0px 0px 0px 1px var(--ButtonShadow), -0.5px -0.5px 0px 1.5px var(--ButtonLight), 0px 0px 0px 2px var(--ButtonDkShadow);
            padding-right: 0;
            margin-left: auto;
            margin-right: auto;
            display: inline-block;
        }

        .window.active {
            border: 1px solid var(--ActiveBorder);
        }

        .window.active .titlebar .titlebar-icon {
            background-color: var(--ActiveTitle);
            color: var(--TitleText);
        }

        .window.active .titlebar .titlebar-title {
            background-color: var(--ActiveTitle);
            background-image: linear-gradient(to right, var(--ActiveTitle), var(--GradientActiveTitle));
            color: var(--TitleText);
        }

        .window.active .titlebar .titlebar-wincontrols,
        .window.active .titlebar .titlebar-wincontrols .buttons-wrapper {
            background-color: var(--GradientActiveTitle);
            font-size: 8pt;
            font-weight: bold;
        }


        .button {
            margin: 2px;
        }

        .button span.button-content {
            display: inline-block;
        }

        .button:active .button-content {
            transform: translate(1px, 1px);
        }

        .button {
            background-color: var(--ButtonFace);
            color: var(--ButtonText);
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonLight), 0px 0px 0px 1px var(--ButtonShadow), -0.5px -0.5px 0px 1.5px var(--ButtonHilight), 0px 0px 0px 2px var(--ButtonDkShadow);
        }

        .button:active {
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonShadow), 0px 0px 0px 1px var(--ButtonShadow), -0.5px -0.5px 0px 1.5px var(--WindowFrame), 0px 0px 0px 2px var(--WindowFrame);
        }

        .button svg path {
            fill: var(--ButtonText);
        }

        .titlebar .button:active {
            box-shadow: -0.5px -0.5px 0px 0.5px var(--ButtonShadow), 0px 0px 0px 1px var(--ButtonLight), -0.5px -0.5px 0px 1.5px var(--ButtonDkShadow), 0px 0px 0px 2px var(--ButtonHilight);
        }

        #status {
            margin: 40px 32px;
        }
    </style>
</head>

<body>
<div class="window active">
    <div class="titlebar">
        <span class="titlebar-title">3D Pinball for Windows - Space Cadet</span>
        <div class="titlebar-wincontrols">
            <ul class="buttons-wrapper">

                         width="0.125017in" xmlns="http://www.w3.org/2000/svg">

                <li class="spacer"></li>
                <li class="button close">
                    <svg class="button-content replaced-svg" height="10" version="1.1"
                         width="12" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
                        <g id="layer1" transform="translate(0,-1042.3622)">
                            <path
                                    d="m 2.0025485,1043.3853 2.0198115,0 0,1.0185 0.984011,0 0,0.984 1.985286,0 0,-0.984 1.001274,0 0,-1.0185 2.002548,0 0,1.0013 0,0 0,0 -1.001274,0 0,1.0012 -1.001274,0 0,0.9841 -1.001274,0 0,1.0012 1.001274,0 0,1.0013 1.001274,0 0,1.0013 1.001274,0 0,1.0013 -2.002548,0 0,-1.0013 -1.001274,0 0,-0.984 -1.985286,0 0,0.984 -1.001274,0 0,1.0013 -2.0025485,0 0,-1.0013 1.0012745,0 0,-1.0013 1.001274,0 0,-1.0013 1.001274,0 0,-1.0012 -1.001274,0 0,-0.9841 -1.001274,0 0,-1.0012 -1.0012745,0 0,-1.0186 z"
                                    fill="black" id="Close" stroke-width="0"></path>
                        </g>

            </ul>
        </div>
    </div>

    <div class="emscripten" id="status">Downloading...</div>
    <div class="emscripten">
        <progress hidden=1 id="progress" max="100" value="0"></progress>
    </div>
    <canvas class="emscripten loading" id="canvas" oncontextmenu="event.preventDefault()"
            tabindex="-1"></canvas>
</div>

<!--<textarea class="emscripten" id="output" rows="8"></textarea>-->

<script type='text/javascript'>
    function getQueryParam(name) {
        var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
        return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
    }

    var volParam = getQueryParam("vol");
    var VolumeQueryParam = volParam !== null && volParam !== undefined ? parseFloat(volParam) : 0.5;

    let arguv = ["-vol", (VolumeQueryParam).toString()]

    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');

    var Module = {
        preRun: [],
        postRun: [],
        print: (function () {
            var element = document.getElementById('output');
            if (element) element.value = ''; // clear browser cache
            return function (text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                // These replacements are necessary if you render to raw HTML
                //text = text.replace(/&/g, "&amp;");
                //text = text.replace(/</g, "&lt;");
                //text = text.replace(/>/g, "&gt;");
                //text = text.replace('\n', '<br>', 'g');
                console.log(text);
                /*if (element) {
                    element.value += text + "\n";
                    element.scrollTop = element.scrollHeight; // focus on bottom
                }*/
            };
        })(),
        printErr: function (text) {
            // alert("ERROR OCCURRED: Check console for details.")
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.error(text);
        },
        canvas: (function () {
            var canvas = document.getElementById('canvas');

            // As a default initial behavior, pop up an alert when webgl context is lost. To make your
            // application robust, you may want to override this behavior before shipping!
            // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
            canvas.addEventListener("webglcontextlost", function (e) {
                console.warn('WebGL context lost.');
                e.preventDefault();
            }, false);

            return canvas;
        })(),
        setStatus: function (text) {
            if (!Module.setStatus.last) Module.setStatus.last = {time: Date.now(), text: ''};
            if (text === Module.setStatus.last.text) return;

            var m = null;
            if (typeof text === 'string') {
                m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
            }
            var now = Date.now();
            if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
            Module.setStatus.last.time = now;
            Module.setStatus.last.text = text || '';
            if (m) {
                text = m[1];
                progressElement.value = parseInt(m[2]) * 100;
                progressElement.max = parseInt(m[4]) * 100;
                progressElement.hidden = false;
            } else {
                progressElement.value = null;
                progressElement.max = null;
                progressElement.hidden = true;

                var canvas = document.getElementById('canvas');
                canvas.classList.remove('loading');
            }
            statusElement.innerHTML = text || '';

            if (text === "") {
                statusElement.style.display = "none";
                progressElement.style.display = "none";
            } else {
                statusElement.style.display = "";
                progressElement.style.display = "";
            }
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        },
        arguments: arguv,
    };
    Module.setStatus('Downloading...');
    window.onerror = function () {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function (text) {
            if (text) Module.printErr('[post-exception status] ' + text);
        };
    };
</script>
<script>
    var debugMode = getQueryParam("debug");

    var volParam = getQueryParam("vol");
    var currentVolume = volParam !== null && volParam !== undefined ? parseFloat(volParam) : 0.5;
    var initialChannel = getQueryParam("channel") || 'bobross';
    var client = null;
    var commandLock = [];

    // Global listener for Pogly live variables
    window.onLiveVariableUpdate = function (name, value) {
        console.log(`Live variable update: ${name} = ${value}`);
        if (name === 'vol' || name === 'volume') {
            var vol = parseFloat(value);
            if (!isNaN(vol)) {
                currentVolume = vol;
                if (typeof Module !== 'undefined' && typeof Module.TriggerEvent === 'function') {
                    Module.TriggerEvent("volume:" + vol);
                }
            }
        } else if (name === 'channel' || name === 'twitchChannel') {
            initialChannel = value;
            if (window.updateTwitchChannel) {
                window.updateTwitchChannel(value);
            }
        }
    };

    // Global listener for Pogly twitch messages
    window.onTwitchMessage = function (data) {
        // If we receive messages via Pogly's own chat integration,
        // disconnect our standalone client to avoid double events.
        if (client && client.readyState() !== "CLOSED") {
            console.log("Pogly chatIntegration active. Disconnecting standalone tmi.js client.");
            client.disconnect().catch(console.error);
        }
        if (window.processTwitchMessage) {
            window.processTwitchMessage(data.username, data.message, data);
        }
    };

    // Listen to parent postMessages
    window.addEventListener('message', (event) => {
        var data = event.data;
        if (!data) return;
        
        if (data.type === 'variableUpdate' || data.event === 'variableUpdate' || (data.name && data.value !== undefined)) {
            window.onLiveVariableUpdate(data.name, data.value);
        }
        
        if (data.type === 'twitchMessage' || data.event === 'twitchMessage' || (data.username && data.message !== undefined)) {
            window.onTwitchMessage(data.data || data);
        }
    });

    Module['onRuntimeInitialized'] = function () {
        console.log('Emscripten runtime initialized.');

        function callTriggerEvent(eventType) {
            if (typeof Module !== 'undefined' && typeof Module.TriggerEvent === 'function') {
                Module.TriggerEvent(eventType);
            } else {
                console.error("Emscripten Module or TriggerEvent function not found.");
            }
        }

        // Apply initial volume if it was updated prior to runtime initialization
        if (currentVolume !== 0.5) {
            callTriggerEvent("volume:" + currentVolume);
        }

        window.processTwitchMessage = function (username, message, tags) {
            if (message.startsWith('!')) {
                var command = message.slice(1).toLowerCase().trim();

                function hasBadge(badges, name) {
                    if (!badges) return false;
                    if (typeof badges.includes === 'function' && badges.includes(name)) return true;
                    if (Array.isArray(badges)) {
                        for (var i = 0; i < badges.length; i++) {
                            if (typeof badges[i] === 'string' && badges[i].split('/')[0] === name) {
                                return true;
                            }
                        }
                    }
                    if (typeof badges === 'object' && badges[name] !== undefined && badges[name] !== null) {
                        return true;
                    }
                    return false;
                }

                // Allow mods, broadcaster, and VIPs
                var isMod = tags.mod === true || tags.isMod === true || hasBadge(tags.badges, 'moderator');
                var isBroadcaster = initialChannel.toLowerCase() === username.toLowerCase()
                                      || hasBadge(tags.badges, 'broadcaster');
                var isVip = hasBadge(tags.badges, 'vip') || tags.isVip === true;

                switch (command) {
                    case 'left':
                        if (commandLock.includes('left')) return;
                        callTriggerEvent('leftdown');
                        commandLock.push('left');
                        setTimeout(() => {
                            callTriggerEvent('leftup');
                            commandLock = commandLock.filter(cmd => cmd !== 'left');
                        }, 200);
                        break;
                    case 'right':
                        if (commandLock.includes('right')) return;
                        callTriggerEvent('rightdown');
                        commandLock.push('right');
                        setTimeout(() => {
                            callTriggerEvent('rightup');
                            commandLock = commandLock.filter(cmd => cmd !== 'right');
                        }, 200);
                        break;
                    case 'launch':
                        if (!isMod && !isBroadcaster && !isVip) return;
                        callTriggerEvent("launch");
                        break;
                    case 'newgame':
                        if (!isMod && !isBroadcaster && !isVip) return;
                        callTriggerEvent('newgame');
                        break;
                    case 'demo':
                        if (!isMod && !isBroadcaster && !isVip) return;
                        callTriggerEvent("demo");
                        break;
                }
            }
        };

        window.updateTwitchChannel = function (newChannel) {
            if (!newChannel) return;
            newChannel = newChannel.toLowerCase().replace('#', '').trim();
            if (client) {
                console.log("Disconnecting twitch client from current channel...");
                client.disconnect().catch(console.error);
            }
            
            console.log("Connecting twitch client to new channel: " + newChannel);
            client = new tmi.Client({
                connection: {
                    reconnect: true,
                    maxReconnectAttempts: Infinity,
                    maxReconnectInterval: 30000,
                    reconnectDecay: 1.4,
                    reconnectInterval: 5000,
                    timeout: 180000,
                },
                channels: [newChannel]
            });

            client.connect().catch(console.error);
            client.on('connected', (addr, port) => {
                console.log(`Connected to ${addr}:${port} and listening to ${client.getChannels()}`);
            });

            client.on('message', (channel, tags, message, self) => {
                if (self) return;
                window.processTwitchMessage(tags.username || tags['display-name'], message, tags);
            });
        };

        // Initialize standalone tmi client
        window.updateTwitchChannel(initialChannel);
    };
</script>
